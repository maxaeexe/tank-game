<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tanks: Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="background-fx" style="display:none;"></div>
    
    <div id="ui-layer">
        <!-- Main Menu -->
        <div id="main-menu" class="panel active">
            <h1 class="glitch" data-text="NEON TANKS">NEON TANKS</h1>
            <p class="subtitle">TACTICAL TOP-DOWN MAYHEM</p>
            
            <div class="menu-actions">
                <div class="card">
                    <h3>HOST A MATCH</h3>
                    <select id="mode-select" class="styled-input">
                        <option value="ffa">Free For All (FFA)</option>
                        <option value="team">Team Deathmatch</option>
                    </select>
                    <button id="btn-create" class="btn primary">CREATE ROOM</button>
                </div>

                <div class="divider">OR</div>

                <div class="card">
                    <h3>JOIN A MATCH</h3>
                    <input type="text" id="room-code-input" class="styled-input" placeholder="Enter Room Code" maxlength="5">
                    <button id="btn-join" class="btn secondary">JOIN ROOM</button>
                </div>
            </div>
            <div id="error-msg" class="error-text"></div>
        </div>

        <!-- Lobby Menu -->
        <div id="lobby-menu" class="panel">
            <h2>ROOM CODE: <span id="display-room-code" class="highlight"></span></h2>
            
            <div class="lobby-content">
                <div class="players-list-container">
                    <h3>PLAYERS (<span id="player-count">1/8</span>)</h3>
                    <ul id="players-list">
                        <!-- Player items generated by JS -->
                    </ul>
                </div>

                <div class="customization">
                    <h3>YOUR TANK</h3>
                    <div class="color-picker" id="color-picker">
                        <!-- Color options generated by JS -->
                    </div>
                    <div class="tank-preview">
                        <div id="preview-tank-body" class="tank-body">
                            <div class="tank-turret"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lobby-footer">
                <button id="btn-start" class="btn primary" style="display: none;">START GAME</button>
                <div id="waiting-msg" class="waiting-text">Waiting for host to start...</div>
            </div>
        </div>

        <!-- In Game UI -->
        <div id="game-ui" class="hidden">
            <div class="top-bar">
                <div class="health-container">
                    <div class="hp-label">LIVES: <span id="hp-value">1</span></div>
                </div>
                <div class="score-container">
                    <div class="hp-label">SCORES</div>
                    <ul id="score-list" style="list-style:none; font-size:10px; margin-top:5px; line-height:1.5;"></ul>
                </div>
                <div class="room-info">ROOM: <span id="game-room-code"></span></div>
            </div>
        </div>
        
        <!-- Death Screen -->
        <div id="death-screen" class="panel hidden">
            <h2>YOU WERE DESTROYED</h2>
            <p>Respawning in <span id="respawn-timer">3</span>...</p>
        </div>
    </div>

    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
